version: 2

models:
  - name: fact_customer_orders
    config:
      access: public
      contract:
        enforced: true
    description: "fact table for orders created by customers of jaffle shop"
    columns:
      - name: order_id
        data_type: number
        description: "unique id of the order"
        constraints:
          - type: not_null
      - name: customer_id
        data_type: number
        description: "unique id of the customer"

      - name: order_date
        data_type: date
        description: "date of the order"

      - name: order_status
        data_type: varchar
        description: "current order status"

      - name: total_amount_paid
        data_type: number
        description: "order amount that was paid"

      - name: payment_finalized_date
        data_type: date
        description: "the last payment confirm date"

      - name: customer_first_name
        data_type: varchar
        description: "first name of the customer"

      - name: customer_last_name
        data_type: varchar
        description: "last name of the customer"

      - name: transaction_seq
        data_type: number
        description: "transaction row number"

      - name: customer_sales_seq
        data_type: number
        description: "customer order row number for each customer"

      - name: nvsr
        data_type: varchar
        description: "new or returning type of customer"

      - name: customer_lifetime_value
        data_type: number
        description: "total amount purchased by customer in the life time"

      - name: fdos
        data_type: date
        description: "customer first order date"
  - name: dim_customers
    config:
      access: public
      contract:
        enforced: true
    description: "dimension table for customer that placed orders."
    columns:
      - name: customer_id
        data_type: number
        constraints:
          - type: not_null
        description: "unique id of each customer"

      - name: first_name
        data_type: varchar
        description: "first name of the customer"

      - name: last_name
        data_type: varchar
        description: "last name of the customer"

      - name: first_order_date
        data_type: date
        description: "first order date of the customer."

      - name: most_recent_order_date
        data_type: date
        description: "lastest order data of the cuetomer"

      - name: number_of_orders
        data_type: number
        description: "number of orders for each customer"

      - name: employee_id
        data_type: number
        description: "employee that bought the customer"

      - name: employee_email
        data_type: varchar
        description: "email of the employee"

  - name: fact_orders1
    description: "fact table only for the models."
    config:
      group: finance
      access: public
      contract:
        enforced: true
    columns:
      - name: order_id
        data_type: number
        description: "unique order id"
        constraints:
          - type: not_null

      - name: customer_id
        data_type: number
        description: ""

      - name: order_date
        data_type: date
        description: ""

      - name: amount
        data_type: number
        description: ""
